server {
    listen 80;
    server_name yourdomain.com; # Ganti dengan domain atau IP Anda

    # Log files
    access_log /var/log/nginx/acms_access.log;
    error_log /var/log/nginx/acms_error.log;

    # =========================================================
    # 1. FRONTEND: Next.js Proxy (Subfolder /acms)
    # =========================================================
    location /acms {
        # Redirect ke service PM2 Node.js yang berjalan di port 3000
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # Pengaturan WebSockets & HTTP Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Matikan cache untuk Next.js
        proxy_cache_bypass $http_upgrade;
    }

    # =========================================================
    # 2. BACKEND: Laravel API (Bisa dipisah atau digabung)
    # Jika API diletakkan di subfolder /api, gunakan ini:
    # =========================================================
    # location /api {
    #     alias /var/www/acms/backend/public;
    #     try_files $uri $uri/ @laravel;
    #
    #     location ~ \.php$ {
    #         include snippets/fastcgi-php.conf;
    #         fastcgi_pass unix:/var/run/php/php8.2-fpm.sock; # Sesuaikan versi PHP
    #         fastcgi_param SCRIPT_FILENAME $request_filename;
    #     }
    # }
    # 
    # location @laravel {
    #     rewrite /api/(.*)$ /api/index.php?/$1 last;
    # }

    # =========================================================
    # Fallback default (Opsional)
    # =========================================================
    location / {
        # Redirect ke /acms sebagai aplikasi utama
        return 301 /acms;
    }
}
