name: CI

# Jaring pengaman kualitas (Fase 0). Setiap push/PR menjalankan gerbang yang
# sudah terbukti hijau secara lokal: format + tes backend, dan type-check +
# lint + build frontend. Merge hanya bila semua job hijau.

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, sqlite3, mbstring, bcmath, gd, zip
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Tests (PHPUnit, SQLite in-memory)
        run: php artisan test
        # DB test diatur di phpunit.xml: DB_CONNECTION=sqlite, DB_DATABASE=:memory:

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint (ESLint — gagal hanya pada error, warning diizinkan)
        run: npx eslint .

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
